<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Site indisponible | DJOMBRE SARLU</title>
  <style>
    :root {
      --green: #0f6b46;
      --green-dark: #08452f;
      --gold: #caa24d;
      --text: #18211d;
      --muted: #66736d;
      --border: #e4e9e4;
      --bg: #f5f7f4;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(15, 107, 70, 0.10), rgba(202, 162, 77, 0.12)),
        var(--bg);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .notice {
      width: min(720px, 100%);
      padding: clamp(28px, 6vw, 56px);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(24, 33, 29, 0.10);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 14px;
      margin-bottom: 22px;
      color: var(--green-dark);
      background: rgba(15, 107, 70, 0.08);
      border: 1px solid rgba(15, 107, 70, 0.14);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1;
    }

    p {
      margin: 0 auto;
      max-width: 580px;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.18rem);
      line-height: 1.7;
    }

    .contact {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      margin-top: 30px;
      padding: 0 22px;
      color: var(--white);
      background: var(--green);
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 16px 34px rgba(15, 107, 70, 0.22);
    }

    .contact:hover { background: var(--green-dark); }

    .line {
      width: 84px;
      height: 4px;
      margin: 26px auto 0;
      background: var(--gold);
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <main>
    <section class="notice" aria-labelledby="notice-title">
      <div class="badge">Accès temporaire expiré</div>
      <h1 id="notice-title">Site indisponible</h1>
      <p>
        Cette maquette était disponible pendant une période limitée afin de vous permettre
        d'avoir un aperçu du rendu final. Pour finaliser le travail ou réactiver l'accès,
        veuillez contacter le développeur.
      </p>
      <a class="contact" href="tel:+224628856938">Contacter le développeur : 628 856 938</a>
      <div class="line" aria-hidden="true"></div>
    </section>
  </main>
</body>
</html>
